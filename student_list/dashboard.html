
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Optional: For icons, you can add Font Awesome (uncomment if you want icons) -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> -->
</head>
<body>
    <div class="container">
        <h1>Student Dashboard</h1>

        <div class="add-student-btn-container">
            <button id="addStudentBtn" class="add-btn">
                <!-- <i class="fas fa-user-plus"></i> --> Add New Student
            </button>
        </div>

        <table id="studentTable">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Year Level</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Student data will be loaded here by JavaScript -->
                <tr class="message-row"><td colspan="6" class="loading-message">Loading student data...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- The Add Student Modal/Form will be here -->
    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Add New Student</h2>
            <form id="addStudentForm">
                <div class="form-group">
                    <label for="newStudentId">Student ID:</label>
                    <input type="text" id="newStudentId" name="student_id" required>
                </div>
                <div class="form-group">
                    <label for="newFirstName">First Name:</label>
                    <input type="text" id="newFirstName" name="first_name" required>
                </div>
                <div class="form-group">
                    <label for="newLastName">Last Name:</label>
                    <input type="text" id="newLastName" name="last_name" required>
                </div>
                <div class="form-group">
                    <label for="newEmail">Email:</label>
                    <input type="email" id="newEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="newCourse">Course:</label>
                    <input type="text" id="newCourse" name="course" required>
                </div>
                <div class="form-group">
                    <label for="newYearLevel">Year Level:</label>
                    <input type="text" id="newYearLevel" name="year_level" required>
                </div>
                <button type="submit" class="submit-btn">Add Student</button>
                <p id="addStudentMessage" class="form-message" style="display: none;"></p>
            </form>
        </div>
    </div>

    <!-- Link to your JavaScript file for the Dashboard -->
    <script src="student.js"></script>
</body>
</html>
